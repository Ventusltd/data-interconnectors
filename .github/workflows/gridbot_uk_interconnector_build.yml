name: GridBot UK Interconnector Build

on:
  schedule:
    - cron: '17 6 2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: 'monthly'
        type: choice
        options:
          - 'monthly'
          - 'full'
      start_month:
        description: First month YYYY-MM, or auto for monthly mode
        required: true
        default: 'auto'
      end_month:
        description: Last month YYYY-MM or latest-complete
        required: true
        default: 'latest-complete'
      refetch_months:
        description: Recent complete months to refresh in monthly mode
        required: true
        default: '3'
      fail_on_reconciliation_mismatch:
        description: Fail if monolith reconciliation is not exact within tolerance
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: gridbot-uk-interconnector-build
  cancel-in-progress: false

jobs:
  uk-interconnector-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RUN_MODE: ${{ github.event.inputs.mode || 'monthly' }}
      START_MONTH: ${{ github.event.inputs.start_month || 'auto' }}
      END_MONTH: ${{ github.event.inputs.end_month || 'latest-complete' }}
      REFETCH_MONTHS: ${{ github.event.inputs.refetch_months || '3' }}
      FAIL_RECON: ${{ github.event.inputs.fail_on_reconciliation_mismatch || 'true' }}

    steps:
      - name: Checkout data-interconnectors using GridBot PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Sync latest main before processing
        run: git pull --ff-only origin main

      - name: Clone monolith oracle
        run: |
          rm -rf _monolith
          git clone --depth 1 https://github.com/Ventusltd/globalgrid2050.git _monolith

      - name: Verify monolith interconnector oracle
        run: |
          set -euo pipefail
          ORACLE_DIR="_monolith/uk_energy_tracking_v6/generation_history/interconnectors"
          if [ ! -d "$ORACLE_DIR" ]; then
            echo "Monolith interconnector oracle directory missing: $ORACLE_DIR"
            exit 1
          fi
          COUNT=$(find "$ORACLE_DIR" -maxdepth 1 -type f -name '*.json' | wc -l | tr -d ' ')
          echo "Monolith interconnector oracle JSON files: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "No monolith interconnector oracle JSON files found. Cannot reconcile."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install duckdb pyarrow requests

      - name: Run UK interconnector update
        run: |
          set -euo pipefail
          FLAGS=""
          if [ "$FAIL_RECON" = "false" ]; then
            FLAGS="--allow-reconciliation-mismatch"
          fi
          if [ "$RUN_MODE" = "full" ]; then
            FULL_START="$START_MONTH"
            if [ "$FULL_START" = "auto" ]; then
              FULL_START="2020-12"
            fi
            python pipelines/build_interconnectors.py --start "$FULL_START" --end "$END_MONTH" $FLAGS
          else
            python pipelines/monthly_update_interconnectors.py --start "$START_MONTH" --end "$END_MONTH" --refetch-months "$REFETCH_MONTHS" $FLAGS
          fi

      - name: Upload interconnector build report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uk-interconnector-build-report
          path: |
            reports/INTERCONNECTOR_BUILD_LATEST.md
            reports/json/INTERCONNECTOR_BUILD_LATEST.json

      - name: Commit generated outputs
        run: |
          set -euo pipefail
          git config user.name "Gridbot"
          git config user.email "gridbot@users.noreply.github.com"
          git add flows rollups reports CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "data(interconnectors): auto monthly fetch"
            git pull --ff-only origin main
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
